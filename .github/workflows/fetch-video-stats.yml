name: Fetch YouTube Stats

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trigger-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend stats fetch
        env:
          BACKEND_TRIGGER_URL: ${{ secrets.BACKEND_TRIGGER_URL }}
          CRON_TRIGGER_TOKEN: ${{ secrets.CRON_TRIGGER_TOKEN }}
        run: |
          if [ -z "$BACKEND_TRIGGER_URL" ]; then
            echo "Missing secret: BACKEND_TRIGGER_URL"
            exit 1
          fi

          if [ -z "$CRON_TRIGGER_TOKEN" ]; then
            echo "Missing secret: CRON_TRIGGER_TOKEN"
            exit 1
          fi

          echo "Triggering stats fetch endpoint..."
          curl --fail --show-error --silent \
            -X POST "$BACKEND_TRIGGER_URL" \
            -H "X-Cron-Token: $CRON_TRIGGER_TOKEN" \
            -H "Content-Type: application/json"

          echo "Trigger request completed successfully."
