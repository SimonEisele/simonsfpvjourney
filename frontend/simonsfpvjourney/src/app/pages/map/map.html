<div class="map-wrapper">
    <div #mapContainer id="map"></div>

    <!-- Map overlay: hide arrows and FAB when a video modal is open or feedback modal is open -->
    <ng-container *ngIf="(selectedVideo$ | async) === null && !isFeedbackOpen">
        <ng-container *ngIf="popupVideo$ | async as popupVideo">
            <button
                class="map-nav-arrow left animate"
                *ngIf="canPrev(popupVideo)"
                (click)="goPrevPopup(popupVideo)"
                aria-label="Previous popup">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button
                class="map-nav-arrow right animate"
                *ngIf="canNext(popupVideo)"
                (click)="goNextPopup(popupVideo)"
                aria-label="Next popup">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </ng-container>

        <!-- Floating Feedback Button (hidden while modal is open) -->
        <button class="map-feedback-fab" title="Send Feedback" (click)="isFeedbackOpen = true" *ngIf="!isFeedbackOpen">✉️</button>
    </ng-container>

        <!-- Feedback Modal placeholder removed from inside wrapper -->
    </div>

    <!-- Feedback Modal rendered outside the map wrapper so it overlays navbar and all content -->
    <app-feedback-modal [open]="isFeedbackOpen" (closed)="isFeedbackOpen = false"></app-feedback-modal>


<app-videomodal
    *ngIf="selectedVideo$ | async as selectedVideo"
    [video]="selectedVideo"
    [canPrev]="canPrev(selectedVideo)"
    [canNext]="canNext(selectedVideo)"
    (prev)="goPrev(selectedVideo)"
    (next)="goNext(selectedVideo)"
    (closed)="onModalClosed(selectedVideo)">
</app-videomodal>
