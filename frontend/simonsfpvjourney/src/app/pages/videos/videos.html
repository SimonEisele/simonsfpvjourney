<div class="video-container">
  <h1 class="video-title">Videos</h1>

  <div class="video-filter modern-filter">

  <!-- Header -->
  <div class="filter-header">
    <h2>Filter Videos</h2>
    <button class="btn-reset" type="button" (click)="resetFilter()">Reset</button>
  </div>

  <!-- Search -->
  <div class="filter-search">
    <div class="search-container">
      <input type="text"
             placeholder="Search videos, tags, locations..."
             [(ngModel)]="searchText"
             (input)="onSearchInput()" />

      <div class="search-suggestions"
           *ngIf="showSuggestions && getSuggestions().length">
        <div class="suggestion"
             *ngFor="let s of getSuggestions()"
             (click)="selectSuggestion(s)">
          <span class="label">{{ s.label }}</span>
          <span class="type">{{ s.type }} · {{ s.count }} video{{ s.count === 1 ? '' : 's' }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Filter Grid -->
  <div class="filter-grid">

    <!-- Category -->
    <div>
      <label>Category</label>
      <select [(ngModel)]="filter.category" (change)="applyFilter()">
        <option value="">All ({{ facetCounts.categories['__all__'] ?? videosSnapshot.length }})</option>
        <ng-container *ngFor="let category of categories">
          <option [value]="category.id"
                  *ngIf="(facetCounts.categories[category.id] ?? 0) > 0">
            {{ category.name }} ({{ facetCounts.categories[category.id] ?? category.video_count }})
          </option>
        </ng-container>
      </select>
    </div>

    <!-- Tags -->
    <div>
      <label>Add Tag</label>
      <div class="tag-add-row">
        <select [(ngModel)]="selectedTagToAdd">
          <option [ngValue]="null">Select tag…</option>
          <ng-container *ngFor="let tag of tags">
            <option [ngValue]="tag.id"
                    *ngIf="(facetCounts.tags[tag.id] ?? 0) > 0 && !(filter.tags?.includes(tag.id))">
              {{ tag.name }} ({{ facetCounts.tags[tag.id] ?? tag.video_count }})
            </option>
          </ng-container>
        </select>
        <button type="button" (click)="addTag()">Add</button>
      </div>
      <div class="tag-mode-toggle">
        <span>Match:</span>
        <button type="button"
                [class.active]="(filter.tags_mode ?? 'or') === 'or'"
                (click)="filter.tags_mode = 'or'; applyFilter()">Any</button>
        <button type="button"
                [class.active]="(filter.tags_mode ?? 'or') === 'and'"
                (click)="filter.tags_mode = 'and'; applyFilter()">All</button>
      </div>
    </div>

    <!-- Season -->
    <div *ngIf="showAdvancedFilters">
      <label>Season</label>
      <select [(ngModel)]="filter.season" (change)="applyFilter()">
        <option value="">All ({{ facetCounts.seasons['__all__'] ?? videosSnapshot.length }})</option>
        <option *ngFor="let season of getSeasonOptions()" [value]="season.value">
          {{ season.label }} ({{ season.count }})
        </option>
      </select>
    </div>

    <!-- Weather -->
    <div *ngIf="showAdvancedFilters">
      <label>Weather</label>
      <select [(ngModel)]="filter.weather" (change)="applyFilter()">
        <option value="">All ({{ facetCounts.weathers['__all__'] ?? videosSnapshot.length }})</option>
        <option *ngFor="let weather of getWeatherOptions()" [value]="weather.value">
          {{ weather.label }} ({{ weather.count }})
        </option>
      </select>
    </div>

    <!-- Country -->
    <div *ngIf="showAdvancedFilters">
      <label>Country</label>
      <select [(ngModel)]="filter.country" (change)="applyFilter()">
        <option [ngValue]="null">All ({{ facetCounts.countries['__all__'] ?? videosSnapshot.length }})</option>
        <option *ngFor="let c of availableCountries" [value]="c">
          {{ c }} ({{ facetCounts.countries[c] ?? 0 }})
        </option>
      </select>
    </div>

    <!-- Drone -->
    <div *ngIf="showAdvancedFilters">
      <label>Drone</label>
      <select [(ngModel)]="filter.drone" (change)="applyFilter()">
        <option value="">All ({{ facetCounts.drones['__all__'] ?? videosSnapshot.length }})</option>
        <ng-container *ngFor="let drone of drones">
          <option [value]="drone.id" *ngIf="(facetCounts.drones[drone.id] ?? 0) > 0">
            {{ drone.name }} ({{ facetCounts.drones[drone.id] ?? 0 }})
          </option>
        </ng-container>
      </select>
    </div>

    <!-- Time of day -->
    <div *ngIf="showAdvancedFilters">
      <label>Time of Day</label>
      <select [(ngModel)]="filter.time_of_day" (change)="applyFilter()">
        <option value="">All ({{ facetCounts.times['__all__'] ?? videosSnapshot.length }})</option>
        <option *ngFor="let time of getTimeOptions()" [value]="time.value">
          {{ time.label }} ({{ time.count }})
        </option>
      </select>
    </div>

    <!-- Recorded Date -->
    <div *ngIf="showAdvancedFilters">
      <label>Recorded Date</label>
      <div class="range-row">
        <input type="date"
               [(ngModel)]="filter.date_recorded__gte"
               (change)="applyFilter()" />
        <input type="date"
               [(ngModel)]="filter.date_recorded__lte"
               (change)="applyFilter()" />
      </div>
    </div>

    <!-- Altitude -->
    <div *ngIf="showAdvancedFilters">
      <label>Altitude (m)</label>
      <div class="range-row">
        <input type="number"
               placeholder="Min"
               [(ngModel)]="filter.altitude__gte"
               (input)="applyFilter()" />
        <input type="number"
               placeholder="Max"
               [(ngModel)]="filter.altitude__lte"
               (input)="applyFilter()" />
      </div>
    </div>

  </div>

  <!-- Sort -->
  <div class="sort-bar">
    <label>Sort by</label>
    <select [(ngModel)]="filter.order_by" (change)="applyFilter()">
      <option [ngValue]="null">None</option>
      <option [ngValue]="'date_recorded'">Date</option>
      <option [ngValue]="'altitude'">Altitude</option>
      <option [ngValue]="'likes_current'">Likes</option>
      <option [ngValue]="'views_current'">Views</option>
    </select>

    <select [(ngModel)]="filter.order_dir" (change)="applyFilter()">
      <option [ngValue]="'desc'">Descending</option>
      <option [ngValue]="'asc'">Ascending</option>
    </select>

    <button class="toggle-advanced"
            type="button"
            (click)="toggleAdvanced()">
      {{ showAdvancedFilters ? 'Fewer Filters' : 'More Filters' }}
    </button>
  </div>

  <!-- Selected Tags -->
  <div class="tag-chips" *ngIf="filter.tags?.length">
    <div class="tag-chip" *ngFor="let tagId of filter.tags">
      <span>{{ getTagName(tagId) }}</span>
      <button type="button"
              class="chip-remove"
              (click)="removeTag(tagId)">×</button>
    </div>
  </div>

</div>

  <div class="video-list">
    <div *ngFor="let video of videos$ | async" class="video-card" (click)="onClick(video)">
      <div class="video-thumb">
        <img [src]="video.thumbnail" alt="{{ video.title }}"/>
        <span class="video-duration" *ngIf="video.duration">{{ video.duration | number:'1.0-0' }}s</span>
      </div>
      <div class="video-info">
        <h3>{{ video.title }}</h3>
        <div class="video-meta" *ngIf="video.category">
          <span class="chip category" *ngIf="video.category">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41 11 3H4v7l9.59 9.59a2 2 0 0 0 2.82 0l4.18-4.18a2 2 0 0 0 0-2.82z"></path>
              <line x1="7" y1="7" x2="7.01" y2="7"></line>
            </svg>
            {{ video.category.name }}
          </span>
        </div>
      </div>
      <a class="map-link-btn" [routerLink]="['/']" [queryParams]="{ lat: video.latitude, lon: video.longitude, zoom: 13 }" (click)="$event.stopPropagation()">Map</a>
    </div>
  </div>
  <app-videomodal *ngIf="selectedVideo$ | async as selectedVideo"
                  [video]="selectedVideo"
                  [canPrev]="canPrev(selectedVideo)"
                  [canNext]="canNext(selectedVideo)"
                  (prev)="goPrev(selectedVideo)"
                  (next)="goNext(selectedVideo)"
                  (closed)="selectedVideo$.next(null)"></app-videomodal>
</div>
