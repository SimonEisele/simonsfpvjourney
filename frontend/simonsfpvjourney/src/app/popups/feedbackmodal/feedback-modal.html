<div *ngIf="open" class="modal-backdrop" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()" #contentRoot tabindex="0" role="dialog" aria-modal="true">
    <button class="close-btn" (click)="onClose()" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="modal-body">
      <h3 class="fb-title">Feedback</h3>
      <p class="fb-sub">Tell me what you like or what could be improved.</p>

      <div class="fb-field">
        <label>Message<span>*</span></label>
        <textarea id="feedback-message" [(ngModel)]="message" rows="4" placeholder="Your feedback..." (input)="onInputMessage()" [disabled]="submitting"></textarea>
        <div class="error" *ngIf="messageError">{{ messageError }}</div>
      </div>

      <div class="fb-grid">
        <div class="fb-field">
          <label>Name</label>
          <input [(ngModel)]="name" type="text" placeholder="Optional" />
        </div>
        <div class="fb-field">
          <label>Contact</label>
          <input [(ngModel)]="contact" type="text" placeholder="Email, phone, Instagram (optional)" />
        </div>
      </div>

      <div class="fb-field">
        <label>Category</label>
        <select [(ngModel)]="category">
          <option value="">Select..</option>
          <option value="bug">Bug</option>
          <option value="idea">Idea</option>
          <option value="improvement">Improvement</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="fb-actions">
        <button class="fb-submit" [disabled]="submitting" (click)="submit()">
          {{ submitting ? 'Sending…' : 'Send Feedback' }}
        </button>
      </div>

      <p class="fb-success" *ngIf="success">Thank you! Your feedback has been sent.</p>
      <p class="fb-error" *ngIf="error">{{ error }}</p>
    </div>
  </div>
</div>
