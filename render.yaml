services:
  - type: web
    name: simonsfpvjourney-frontend
    env: static
    rootDir: frontend/simonsfpvjourney
    buildCommand: npm ci && npm run build:prod
    staticPublishPath: dist/simonsfpvjourney/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: cron
    name: simonsfpvjourney-youtube-stats
    env: python
    rootDir: backend/simonsfpvjourney
    buildCommand: pip install -r requirements.txt
    schedule: "*/15 * * * *"
    startCommand: python manage.py fetch_video_stats
